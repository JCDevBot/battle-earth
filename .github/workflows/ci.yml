name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Report tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_maxtimeout: "120000"
        run: npm ci --no-audit --no-fund 2>&1 | tee npm-ci.log

      - name: Upload install diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-diagnostics
          path: npm-ci.log
          if-no-files-found: error

      - name: Lint
        run: npm run lint 2>&1 | tee lint-report.txt

      - name: Upload lint diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint-report.txt
          if-no-files-found: ignore

      - name: Test
        run: npm test 2>&1 | tee test-report.txt

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics
          path: test-report.txt
          if-no-files-found: error

      - name: Check formatting
        run: npm run format:check 2>&1 | tee format-report.txt

      - name: Upload formatting diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: format-diagnostics
          path: format-report.txt
          if-no-files-found: error

      - name: Build
        run: npm run build 2>&1 | tee build-report.txt

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build-report.txt
          if-no-files-found: error

      - name: Smoke test production output
        run: |
          python3 -m http.server 4173 --bind 127.0.0.1 --directory dist > preview-report.txt 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:4173/ \
              --output preview-index.html; then
              break
            fi
            sleep 1
          done

          test -s preview-index.html
          grep --fixed-strings '<div id="root"></div>' preview-index.html

      - name: Upload preview diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: preview-diagnostics
          path: |
            preview-report.txt
            preview-index.html
          if-no-files-found: warn
