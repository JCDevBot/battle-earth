name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org

      - name: Report tool versions
        run: |
          node --version
          npm --version
          npm config get registry

      - name: Normalize lockfile registry URLs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          lockfile = Path("package-lock.json")
          content = lockfile.read_text()
          internal_registry = "https://packages.applied-caas-gateway1.internal.api.openai.org/artifactory/api/npm/npm-public/"
          public_registry = "https://registry.npmjs.org/"

          if internal_registry in content:
              lockfile.write_text(content.replace(internal_registry, public_registry))
          PY

      - name: Reset npm cache
        run: npm cache clean --force

      - name: Install dependencies
        id: install
        env:
          npm_config_audit: "false"
          npm_config_fund: "false"
          npm_config_fetch_retries: "5"
          npm_config_fetch_retry_maxtimeout: "120000"
          npm_config_registry: https://registry.npmjs.org
        run: |
          set -o pipefail
          npm ci --no-audit --no-fund --registry=https://registry.npmjs.org 2>&1 | tee npm-ci.log

      - name: Upload install diagnostics
        if: failure() && steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-diagnostics-node-${{ matrix.node-version }}
          path: |
            npm-ci.log
            ~/.npm/_logs/*.log
          if-no-files-found: warn

      - name: Lint
        id: lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee lint-report.txt

      - name: Upload lint diagnostics
        if: failure() && steps.lint.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics-node-${{ matrix.node-version }}
          path: lint-report.txt
          if-no-files-found: error

      - name: Test
        id: test
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-report.txt

      - name: Upload test diagnostics
        if: failure() && steps.test.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: test-diagnostics-node-${{ matrix.node-version }}
          path: test-report.txt
          if-no-files-found: error

      - name: Check formatting
        id: format
        run: |
          set +e
          set -o pipefail
          npm run format:check 2>&1 | tee format-report.txt
          format_status=${PIPESTATUS[0]}
          if [ "$format_status" -ne 0 ]; then
            npm run format >/dev/null 2>&1
            git diff -- . > prettier-format.patch
          fi
          exit "$format_status"

      - name: Upload formatting diagnostics
        if: failure() && steps.format.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: formatting-diagnostics-node-${{ matrix.node-version }}
          path: |
            format-report.txt
            prettier-format.patch
          if-no-files-found: error

      - name: Build
        id: build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-report.txt
          test -f dist/index.html

      - name: Upload build diagnostics
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-node-${{ matrix.node-version }}
          path: build-report.txt
          if-no-files-found: error

      - name: Smoke test production output
        id: preview
        run: |
          python3 -m http.server --bind 127.0.0.1 --directory "$PWD/dist" 4173 > preview-report.txt 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent --show-error \
              http://127.0.0.1:4173/ \
              --output preview-index.html; then
              break
            fi
            sleep 1
          done

          test -s preview-index.html
          grep --fixed-strings '<div id="root"></div>' preview-index.html

      - name: Upload preview diagnostics
        if: failure() && steps.preview.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: preview-diagnostics-node-${{ matrix.node-version }}
          path: |
            preview-report.txt
            preview-index.html
          if-no-files-found: warn
