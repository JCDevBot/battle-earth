name: Import Battle Earth source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out import branch
        uses: actions/checkout@v5
        with:
          ref: agent/initial-stabilization
          fetch-depth: 0

      - name: Verify and expand source archive
        shell: bash
        run: |
          set -euo pipefail

          archive=.bootstrap/battle-earth-source.tar.xz
          checksum=.bootstrap/SHA256

          if [[ ! -f "$archive" ]]; then
            echo "Missing $archive"
            echo "Upload the verified archive to the agent/initial-stabilization branch before running this workflow."
            exit 1
          fi

          if [[ ! -f "$checksum" ]]; then
            echo "Missing $checksum"
            exit 1
          fi

          echo "Archive size: $(stat --format='%s bytes' "$archive")"
          (
            cd .bootstrap
            sha256sum --check SHA256
            xz --test battle-earth-source.tar.xz
          )

          tar -xJf "$archive" -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-import.yml

          # The workflow token cannot create another workflow file. CI is
          # committed separately after the source import succeeds.
          rm -f .github/workflows/ci.yml

      - name: Commit imported project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Import and stabilize Battle Earth"
          git push origin HEAD:agent/initial-stabilization

      - name: Remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git switch --force-create main origin/main
          git rm .github/workflows/bootstrap-import-manual.yml
          git commit -m "Remove completed source import workflow"
          git push origin main
