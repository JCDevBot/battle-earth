name: Bootstrap Battle Earth source

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  import-source:
    if: github.event.issue.title == 'bootstrap-import-source'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out import branch
        uses: actions/checkout@v4
        with:
          ref: agent/initial-stabilization
          fetch-depth: 0

      - name: Expand source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/part-* > /tmp/battle-earth-source.tar.xz
          tar -xJf /tmp/battle-earth-source.tar.xz -C .
          rm -rf .bootstrap
          rm -f .github/workflows/bootstrap-import.yml

      - name: Commit imported project
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Import and stabilize Battle Earth"
          git push origin HEAD:agent/initial-stabilization

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Source import completed."
